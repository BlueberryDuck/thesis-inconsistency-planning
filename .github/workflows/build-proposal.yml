name: Build AIG Proposal

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/texlive
            ~/.texlive
          key: ${{ runner.os }}-texlive-full
          restore-keys: |
            ${{ runner.os }}-texlive-
      - uses: xu-cheng/latex-action@v3
        with:
          root_file: AIG_proposal.tex
          working_directory: AIG_paper
      - uses: actions/upload-artifact@v4
        with:
          name: AIG_proposal
          path: AIG_paper/AIG_proposal.pdf
      - run: |
          mkdir _site
          cp AIG_paper/AIG_proposal.pdf _site/
          echo '<iframe src="AIG_proposal.pdf" width="100%" height="100%"></iframe>' > _site/index.html
      - uses: actions/upload-pages-artifact@v3
      - uses: actions/deploy-pages@v4
